<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Animasi Assessment Akhir Per Tahap — PROTON Video Bagian 5 (1:55–2:10)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="data:,">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy-deep: #0A2447;
    --navy:      #0F2D5C;
    --navy-soft: #1E4280;
    --red:       #E63329;
    --red-dark:  #C5251D;
    --gold:      #FFC107;
    --ink:       #1A1A1A;
    --text:      #3D3D3D;
    --muted:     #888888;
    --hairline:  #E5E7EB;
    --paper:     #F9FAFB;
    --sky:       #F0F4FA;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: #FFFFFF; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    display: grid;
    place-items: center;
    min-height: 100vh;
    background: #FFFFFF;
  }

  .stage {
    width: min(96vw, 1600px);
    aspect-ratio: 16 / 9;
    position: relative;
    background: linear-gradient(180deg, #FFFFFF 0%, var(--sky) 100%);
    border: 1px solid var(--hairline);
    box-shadow: 0 1px 2px rgba(0,0,0,0.02), 0 24px 64px rgba(10,36,71,0.06);
    border-radius: 8px;
    overflow: hidden;
    padding: clamp(28px, 3vw, 48px) clamp(36px, 4vw, 64px);
    display: flex;
    flex-direction: column;
  }

  /* ===== GRID BACKDROP ===== */
  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(15,45,92,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,45,92,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    opacity: 0;
    animation: fadeIn 0.4s 0.1s ease-out forwards;
    z-index: 0;
  }
  .stage > * { position: relative; z-index: 1; }

  /* ===== HEADER ===== */
  .header {
    margin-bottom: clamp(12px, 1.5vw, 24px);
    opacity: 0;
    transform: translateY(-8px);
    animation: fadeDown 0.8s 0.2s cubic-bezier(0.2, 0, 0.2, 1) forwards;
  }
  .eyebrow {
    font-size: clamp(11px, 0.9vw, 14px);
    font-weight: 800;
    color: var(--red);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .title {
    font-size: clamp(24px, 2.2vw, 38px);
    font-weight: 900;
    color: var(--navy-deep);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .title em {
    font-style: normal;
    color: var(--red);
    background-image: linear-gradient(90deg, var(--red), var(--red));
    background-size: 0% 6px;
    background-position: 0 92%;
    background-repeat: no-repeat;
    padding-bottom: 2px;
    animation: underlineDraw 0.6s 1.2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
  }
  @keyframes underlineDraw { to { background-size: 100% 6px; } }
  @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  /* ===== BRAND MARK ===== */
  .brand-mark {
    position: absolute;
    bottom: 20px;
    right: 28px;
    font-size: clamp(10px, 0.78vw, 12px);
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--muted);
    opacity: 0;
    animation: fadeIn 0.8s 1.5s ease-out forwards;
    pointer-events: none;
  }

  /* ===== SCENES CONTAINER ===== */
  .scenes {
    flex: 1;
    position: relative;
    min-height: 0;
    margin: clamp(8px, 1vw, 16px) 0;
  }
  .scene {
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 1.5vw, 24px);
  }
  .scene.active {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== BROWSER FRAME (reusable) ===== */
  .browser-frame {
    width: 100%;
    max-width: 1100px;
    background: #FFFFFF;
    border: 1px solid var(--hairline);
    border-radius: 10px;
    box-shadow: 0 1px 2px rgba(10,36,71,0.03), 0 12px 32px rgba(10,36,71,0.06);
    overflow: hidden;
  }
  .browser-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #F5F7FA;
    border-bottom: 1px solid var(--hairline);
  }
  .browser-bar .dots {
    display: flex;
    gap: 6px;
  }
  .browser-bar .dots i {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #D0D5DD;
    display: inline-block;
  }
  .browser-bar .dots i:first-child { background: #F56565; }
  .browser-bar .dots i:nth-child(2) { background: #ECC94B; }
  .browser-bar .dots i:nth-child(3) { background: #48BB78; }
  .browser-bar .url {
    flex: 1;
    font-size: clamp(11px, 0.85vw, 13px);
    color: var(--muted);
    font-weight: 600;
  }
  .browser-bar .url em {
    font-style: normal;
    color: var(--navy-deep);
    font-weight: 700;
  }
  .browser-body {
    padding: clamp(20px, 2vw, 32px);
    min-height: clamp(280px, 30vw, 420px);
    position: relative;
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="header">
      <div class="eyebrow">Bagian 5 · Assessment Akhir</div>
      <h1 class="title">Standar Penilaian <em>Per Tahap</em></h1>
    </div>

    <div class="scenes">
      <!-- 2 scene akan ditambahkan task 4-5 -->
    </div>

    <div class="brand-mark">PROTON × KPB</div>
  </div>
</body>
</html>
