<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Animasi CMP & CDP Mockup — PROTON Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="icon" href="data:,">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy-deep: #0A2447;
    --navy:      #0F2D5C;
    --navy-soft: #1E4280;
    --red:       #E63329;
    --red-dark:  #C5251D;
    --ink:       #1A1A1A;
    --text:      #3D3D3D;
    --muted:     #888888;
    --hairline:  #E5E7EB;
    --paper:     #F9FAFB;
    --sky:       #F0F4FA;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: #FFFFFF; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    display: grid;
    place-items: center;
    min-height: 100vh;
    background: #FFFFFF;
  }

  .stage {
    width: min(96vw, 1600px);
    aspect-ratio: 16 / 9;
    position: relative;
    background: linear-gradient(180deg, #FFFFFF 0%, var(--sky) 100%);
    border: 1px solid var(--hairline);
    box-shadow: 0 1px 2px rgba(0,0,0,0.02), 0 24px 64px rgba(10,36,71,0.06);
    border-radius: 8px;
    overflow: hidden;
    padding: clamp(28px, 3vw, 48px) clamp(36px, 4vw, 64px);
    display: flex;
    flex-direction: column;
  }

  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(15,45,92,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,45,92,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    opacity: 0;
    animation: fadeIn 0.4s 0.1s ease-out forwards;
    z-index: 0;
  }
  .stage > * { position: relative; z-index: 1; }

  .header {
    margin-bottom: clamp(12px, 1.5vw, 24px);
    opacity: 0;
    transform: translateY(-8px);
    animation: fadeDown 0.8s 0.2s cubic-bezier(0.2, 0, 0.2, 1) forwards;
  }
  .eyebrow {
    font-size: clamp(11px, 0.9vw, 14px);
    font-weight: 800;
    color: var(--red);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .title {
    font-size: clamp(24px, 2.2vw, 38px);
    font-weight: 900;
    color: var(--navy-deep);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .title em {
    font-style: normal;
    color: var(--red);
    background-image: linear-gradient(90deg, var(--red), var(--red));
    background-size: 0% 6px;
    background-position: 0 92%;
    background-repeat: no-repeat;
    padding-bottom: 2px;
    animation: underlineDraw 0.6s 1.2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
  }
  @keyframes underlineDraw { to { background-size: 100% 6px; } }
  @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .brand-mark {
    position: absolute;
    bottom: 20px;
    right: 28px;
    font-size: clamp(10px, 0.78vw, 12px);
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--muted);
    opacity: 0;
    animation: fadeIn 0.8s 1.5s ease-out forwards;
    pointer-events: none;
  }

  /* ===== SCENES CONTAINER ===== */
  .scenes {
    flex: 1;
    position: relative;
    min-height: 0;
    margin: clamp(8px, 1vw, 16px) 0;
  }
  .scene {
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 1.5vw, 24px);
  }
  .scene.active {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== PORTAL FRAME ===== */
  .portal-frame {
    width: 100%;
    max-width: 1100px;
    background: #FFFFFF;
    border: 1px solid var(--hairline);
    border-radius: 10px;
    box-shadow: 0 1px 2px rgba(10,36,71,0.03), 0 12px 32px rgba(10,36,71,0.06);
    overflow: hidden;
  }
  .portal-navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: #FFFFFF;
    border-bottom: 1px solid var(--hairline);
    box-shadow: 0 2px 4px rgba(10,36,71,0.03);
  }
  .portal-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: clamp(13px, 1.1vw, 16px);
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -0.01em;
  }
  .portal-brand-icon {
    width: clamp(18px, 1.6vw, 24px);
    height: clamp(18px, 1.6vw, 24px);
    fill: var(--navy);
  }
  .portal-nav {
    display: flex;
    gap: clamp(14px, 1.8vw, 28px);
    flex: 1;
    justify-content: center;
  }
  .portal-nav-item {
    font-size: clamp(11px, 0.95vw, 13px);
    font-weight: 500;
    color: var(--text);
    text-decoration: none;
  }
  .portal-nav-item.active { color: var(--navy); font-weight: 700; }
  .portal-user {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: clamp(11px, 0.9vw, 13px);
    color: var(--text);
    font-weight: 600;
  }
  .portal-avatar {
    width: clamp(26px, 2.2vw, 32px);
    height: clamp(26px, 2.2vw, 32px);
    border-radius: 50%;
    background: var(--navy);
    color: #FFFFFF;
    display: grid;
    place-items: center;
    font-weight: 800;
    font-size: clamp(9px, 0.8vw, 11px);
  }

  .portal-breadcrumb {
    padding: 10px 20px 4px;
    font-size: clamp(10px, 0.82vw, 12px);
    color: var(--muted);
    background: var(--paper);
    border-bottom: 1px solid var(--hairline);
  }
  .portal-breadcrumb .crumb { color: var(--muted); }
  .portal-breadcrumb .crumb.active { color: var(--navy-deep); font-weight: 700; }
  .portal-breadcrumb .sep { margin: 0 6px; opacity: 0.6; }

  .portal-title {
    padding: 14px 20px 12px;
    background: #FFFFFF;
    border-bottom: 1px solid var(--hairline);
  }
  .portal-title h2 {
    font-size: clamp(16px, 1.5vw, 22px);
    font-weight: 800;
    color: var(--navy-deep);
    margin-bottom: 2px;
    line-height: 1.2;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .portal-title h2 .bi {
    font-size: 1.1em;
    color: var(--navy);
  }
  .portal-title p {
    font-size: clamp(10px, 0.82vw, 12px);
    color: var(--muted);
    margin: 0;
  }

  .portal-body {
    padding: clamp(14px, 1.6vw, 22px) clamp(16px, 1.8vw, 24px);
    min-height: clamp(220px, 24vw, 320px);
    position: relative;
    background: #FFFFFF;
  }

  #scene-cdp .portal-body {
    min-height: clamp(280px, 30vw, 400px);
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="header">
      <div class="eyebrow">Platform Portal HC KPB</div>
      <h1 class="title">Dua Platform <em>Inti</em></h1>
    </div>

    <div class="scenes">
      <!-- 2 scene akan ditambahkan task 4-5 -->
    </div>

    <div class="brand-mark">PROTON × KPB</div>
  </div>
</body>
</html>
