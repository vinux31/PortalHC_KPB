<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FBF9"/>
      <stop offset="100%" stop-color="#E2EDE5"/>
    </linearGradient>
    <linearGradient id="trackG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C95B"/>
      <stop offset="100%" stop-color="#005522"/>
    </linearGradient>
    <filter id="shadow2"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="960" y="120" text-anchor="middle" font-size="22" font-weight="700" fill="#FFB300" letter-spacing="8">PRINSIP</text>
  <text x="960" y="195" text-anchor="middle" font-size="68" font-weight="900" fill="#005522" letter-spacing="4">S · M · A · R · T</text>
  <text x="960" y="245" text-anchor="middle" font-size="22" fill="#666" font-weight="500" letter-spacing="2">Kerangka pengembangan kompetensi PROTON</text>

  <!-- Horizontal Track -->
  <line x1="240" y1="600" x2="1680" y2="600" stroke="url(#trackG)" stroke-width="8" stroke-linecap="round"/>

  <!-- Tick marks -->
  <g fill="#005522">
    <circle cx="240"  cy="600" r="14"/>
    <circle cx="600"  cy="600" r="14"/>
    <circle cx="960"  cy="600" r="14"/>
    <circle cx="1320" cy="600" r="14"/>
    <circle cx="1680" cy="600" r="14"/>
  </g>

  <!-- 5 nodes: alternating above/below -->
  <!-- NODE S (above) -->
  <g transform="translate(240, 600)" filter="url(#shadow2)">
    <line x1="0" y1="0" x2="0" y2="-180" stroke="#005522" stroke-width="2" stroke-dasharray="4 6"/>
    <circle cx="0" cy="-230" r="65" fill="#fff" stroke="#005522" stroke-width="6"/>
    <text x="0" y="-215" text-anchor="middle" font-size="72" font-weight="900" fill="#005522">S</text>
    <rect x="-150" y="-400" width="300" height="120" rx="14" fill="#005522"/>
    <text x="0" y="-360" text-anchor="middle" font-size="28" font-weight="800" fill="#fff" letter-spacing="2">SPECIFIC</text>
    <text x="0" y="-330" text-anchor="middle" font-size="18" font-weight="500" fill="#A5D6A7">Spesifik</text>
    <text x="0" y="-300" text-anchor="middle" font-size="16" fill="#fff" opacity="0.9">Target jelas, tidak ambigu</text>
  </g>

  <!-- NODE M (below) -->
  <g transform="translate(600, 600)" filter="url(#shadow2)">
    <line x1="0" y1="0" x2="0" y2="180" stroke="#005522" stroke-width="2" stroke-dasharray="4 6"/>
    <circle cx="0" cy="230" r="65" fill="#fff" stroke="#005522" stroke-width="6"/>
    <text x="0" y="252" text-anchor="middle" font-size="72" font-weight="900" fill="#005522">M</text>
    <rect x="-150" y="280" width="300" height="120" rx="14" fill="#FFB300"/>
    <text x="0" y="320" text-anchor="middle" font-size="28" font-weight="800" fill="#fff" letter-spacing="2">MEASURABLE</text>
    <text x="0" y="350" text-anchor="middle" font-size="18" font-weight="500" fill="#FFF3E0">Terukur</text>
    <text x="0" y="380" text-anchor="middle" font-size="16" fill="#fff" opacity="0.95">Parameter evaluasi terukur</text>
  </g>

  <!-- NODE A (above) -->
  <g transform="translate(960, 600)" filter="url(#shadow2)">
    <line x1="0" y1="0" x2="0" y2="-180" stroke="#005522" stroke-width="2" stroke-dasharray="4 6"/>
    <circle cx="0" cy="-230" r="65" fill="#fff" stroke="#005522" stroke-width="6"/>
    <text x="0" y="-215" text-anchor="middle" font-size="72" font-weight="900" fill="#005522">A</text>
    <rect x="-150" y="-400" width="300" height="120" rx="14" fill="#005522"/>
    <text x="0" y="-360" text-anchor="middle" font-size="28" font-weight="800" fill="#fff" letter-spacing="2">ACHIEVABLE</text>
    <text x="0" y="-330" text-anchor="middle" font-size="18" font-weight="500" fill="#A5D6A7">Dapat Dicapai</text>
    <text x="0" y="-300" text-anchor="middle" font-size="16" fill="#fff" opacity="0.9">Sesuai kemampuan coachee</text>
  </g>

  <!-- NODE R (below) -->
  <g transform="translate(1320, 600)" filter="url(#shadow2)">
    <line x1="0" y1="0" x2="0" y2="180" stroke="#005522" stroke-width="2" stroke-dasharray="4 6"/>
    <circle cx="0" cy="230" r="65" fill="#fff" stroke="#005522" stroke-width="6"/>
    <text x="0" y="252" text-anchor="middle" font-size="72" font-weight="900" fill="#005522">R</text>
    <rect x="-150" y="280" width="300" height="120" rx="14" fill="#FFB300"/>
    <text x="0" y="320" text-anchor="middle" font-size="28" font-weight="800" fill="#fff" letter-spacing="2">RELEVANT</text>
    <text x="0" y="350" text-anchor="middle" font-size="18" font-weight="500" fill="#FFF3E0">Relevan</text>
    <text x="0" y="380" text-anchor="middle" font-size="16" fill="#fff" opacity="0.95">Sesuai lingkup pekerjaan</text>
  </g>

  <!-- NODE T (above) -->
  <g transform="translate(1680, 600)" filter="url(#shadow2)">
    <line x1="0" y1="0" x2="0" y2="-180" stroke="#005522" stroke-width="2" stroke-dasharray="4 6"/>
    <circle cx="0" cy="-230" r="65" fill="#fff" stroke="#005522" stroke-width="6"/>
    <text x="0" y="-215" text-anchor="middle" font-size="72" font-weight="900" fill="#005522">T</text>
    <rect x="-150" y="-400" width="300" height="120" rx="14" fill="#005522"/>
    <text x="0" y="-360" text-anchor="middle" font-size="28" font-weight="800" fill="#fff" letter-spacing="2">TIME-BOUND</text>
    <text x="0" y="-330" text-anchor="middle" font-size="18" font-weight="500" fill="#A5D6A7">Berjangka Waktu</text>
    <text x="0" y="-300" text-anchor="middle" font-size="16" fill="#fff" opacity="0.9">Jadwal awal &amp; akhir jelas</text>
  </g>

  <!-- Footer -->
  <text x="960" y="1020" text-anchor="middle" font-size="16" fill="#888" letter-spacing="3">PROTON · PROGRAM COACHING PEKERJA · PORTAL HC KPB</text>
</svg>
