<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001F0E"/>
      <stop offset="100%" stop-color="#003A1A"/>
    </linearGradient>
    <linearGradient id="letterFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00C95B"/>
      <stop offset="100%" stop-color="#007A36"/>
    </linearGradient>
    <linearGradient id="letterAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg4)"/>

  <!-- subtle grid -->
  <g stroke="#FFFFFF" stroke-width="1" opacity="0.04">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
  </g>

  <!-- Eyebrow -->
  <text x="960" y="120" text-anchor="middle" font-size="20" font-weight="600" fill="#FFD54F" letter-spacing="8">PRINSIP</text>
  <text x="960" y="195" text-anchor="middle" font-size="56" font-weight="800" fill="#fff" letter-spacing="3">Apa itu <tspan fill="#FFD54F">SMART</tspan>?</text>

  <!-- 5 GIANT LETTERS row -->
  <g font-family="'Inter Black','Arial Black',sans-serif" font-weight="900" font-size="380" text-anchor="middle">
    <!-- S -->
    <text x="240" y="640" fill="url(#letterFill)" stroke="#FFD54F" stroke-width="3">S</text>
    <text x="240" y="730" font-size="32" font-weight="800" fill="#fff" letter-spacing="2">SPECIFIC</text>
    <text x="240" y="775" font-size="20" font-weight="500" fill="#A5D6A7" letter-spacing="1">Spesifik</text>
    <text x="240" y="830" font-size="18" fill="#E0E0E0">Target &amp; deliverable</text>
    <text x="240" y="855" font-size="18" fill="#E0E0E0">jelas, tidak ambigu.</text>

    <!-- M -->
    <text x="600" y="640" fill="url(#letterFill)" stroke="#FFD54F" stroke-width="3">M</text>
    <text x="600" y="730" font-size="32" font-weight="800" fill="#fff" letter-spacing="2">MEASURABLE</text>
    <text x="600" y="775" font-size="20" font-weight="500" fill="#A5D6A7" letter-spacing="1">Terukur</text>
    <text x="600" y="830" font-size="18" fill="#E0E0E0">Parameter evaluasi</text>
    <text x="600" y="855" font-size="18" fill="#E0E0E0">yang terukur.</text>

    <!-- A -->
    <text x="960" y="640" fill="url(#letterFill)" stroke="#FFD54F" stroke-width="3">A</text>
    <text x="960" y="730" font-size="32" font-weight="800" fill="#fff" letter-spacing="2">ACHIEVABLE</text>
    <text x="960" y="775" font-size="20" font-weight="500" fill="#A5D6A7" letter-spacing="1">Dapat Dicapai</text>
    <text x="960" y="830" font-size="18" fill="#E0E0E0">Sesuai kemampuan</text>
    <text x="960" y="855" font-size="18" fill="#E0E0E0">coachee.</text>

    <!-- R -->
    <text x="1320" y="640" fill="url(#letterFill)" stroke="#FFD54F" stroke-width="3">R</text>
    <text x="1320" y="730" font-size="32" font-weight="800" fill="#fff" letter-spacing="2">RELEVANT</text>
    <text x="1320" y="775" font-size="20" font-weight="500" fill="#A5D6A7" letter-spacing="1">Relevan</text>
    <text x="1320" y="830" font-size="18" fill="#E0E0E0">Sesuai lingkup</text>
    <text x="1320" y="855" font-size="18" fill="#E0E0E0">pekerjaan.</text>

    <!-- T -->
    <text x="1680" y="640" fill="url(#letterFill)" stroke="#FFD54F" stroke-width="3">T</text>
    <text x="1680" y="730" font-size="32" font-weight="800" fill="#fff" letter-spacing="2">TIME-BOUND</text>
    <text x="1680" y="775" font-size="20" font-weight="500" fill="#A5D6A7" letter-spacing="1">Berjangka Waktu</text>
    <text x="1680" y="830" font-size="18" fill="#E0E0E0">Jadwal awal &amp; akhir</text>
    <text x="1680" y="855" font-size="18" fill="#E0E0E0">jelas.</text>
  </g>

  <!-- Footer -->
  <text x="960" y="1020" text-anchor="middle" font-size="18" fill="#FFD54F" letter-spacing="4">PROTON · PROGRAM COACHING PEKERJA · PORTAL HC KPB</text>
</svg>
