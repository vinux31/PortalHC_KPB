<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2916"/>
      <stop offset="50%" stop-color="#004D22"/>
      <stop offset="100%" stop-color="#0A2916"/>
    </linearGradient>
    <linearGradient id="bigLetter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="50%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFE082" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg8)"/>
  <rect width="1920" height="1080" fill="url(#spotlight)"/>

  <!-- Step indicator dots (top) -->
  <g transform="translate(960, 80)">
    <text x="0" y="-20" text-anchor="middle" font-size="14" font-weight="600" fill="#A5D6A7" letter-spacing="6">PRINSIP SMART · 1 / 5</text>
    <g transform="translate(-100, 10)">
      <circle cx="0"   cy="0" r="10" fill="#FFB300"/>
      <circle cx="50"  cy="0" r="6"  fill="#fff" opacity="0.4"/>
      <circle cx="100" cy="0" r="6"  fill="#fff" opacity="0.4"/>
      <circle cx="150" cy="0" r="6"  fill="#fff" opacity="0.4"/>
      <circle cx="200" cy="0" r="6"  fill="#fff" opacity="0.4"/>
    </g>
  </g>

  <!-- LEFT: Giant letter S -->
  <g>
    <text x="480" y="780" text-anchor="middle"
          font-family="'Inter Black','Arial Black',sans-serif"
          font-weight="900" font-size="900" letter-spacing="-30"
          fill="url(#bigLetter)" stroke="#fff" stroke-width="4">S</text>
  </g>

  <!-- Vertical divider -->
  <line x1="1050" y1="220" x2="1050" y2="900" stroke="#FFD54F" stroke-width="2" opacity="0.4"/>

  <!-- RIGHT: Content panel -->
  <g transform="translate(1130, 360)">
    <text x="0" y="0" font-size="36" font-weight="600" fill="#FFD54F" letter-spacing="6">S — STANDS FOR</text>
    <text x="0" y="100" font-size="120" font-weight="900" fill="#fff" letter-spacing="2">Specific</text>
    <text x="0" y="160" font-size="34" font-weight="600" fill="#A5D6A7" letter-spacing="3">/ Spesifik</text>

    <line x1="0" y1="210" x2="120" y2="210" stroke="#FFB300" stroke-width="6"/>

    <text x="0" y="280" font-size="32" fill="#E8F5E9" font-weight="500">PROTON memiliki target dan</text>
    <text x="0" y="325" font-size="32" fill="#E8F5E9" font-weight="500">deliverable yang jelas, tidak</text>
    <text x="0" y="370" font-size="32" fill="#E8F5E9" font-weight="500">ambigu, dan dapat dipahami</text>
    <text x="0" y="415" font-size="32" fill="#E8F5E9" font-weight="500">oleh seluruh pihak.</text>

    <!-- Example chip -->
    <g transform="translate(0, 470)">
      <rect x="0" y="0" width="500" height="80" rx="40" fill="#FFB300" opacity="0.15" stroke="#FFB300" stroke-width="2"/>
      <text x="30" y="50" font-size="22" font-weight="600" fill="#FFD54F">CONTOH:</text>
      <text x="150" y="50" font-size="22" fill="#fff" font-weight="500">"Lulus Final Assessment ≥75"</text>
    </g>
  </g>

  <!-- Bottom hint -->
  <text x="1130" y="1020" font-size="18" fill="#A5D6A7" letter-spacing="3">→ NEXT: M — MEASURABLE</text>
</svg>
