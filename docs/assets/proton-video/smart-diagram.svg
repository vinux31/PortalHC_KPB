<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <!-- ====== Background ====== -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#F5FAF7"/>
      <stop offset="100%" stop-color="#E8F0EA"/>
    </radialGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00A148"/>
      <stop offset="100%" stop-color="#007A36"/>
    </linearGradient>
    <linearGradient id="card-s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="card-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="card-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB8C00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="card-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8E24AA"/>
      <stop offset="100%" stop-color="#5E35B1"/>
    </linearGradient>
    <linearGradient id="card-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- ====== Title ====== -->
  <text x="960" y="100" text-anchor="middle" font-size="56" font-weight="800" fill="#007A36" letter-spacing="2">
    PRINSIP <tspan fill="#FFB81C">SMART</tspan>
  </text>
  <text x="960" y="148" text-anchor="middle" font-size="22" font-weight="500" fill="#666" letter-spacing="3">
    PROTON · Program Coaching Pekerja · Portal HC KPB
  </text>

  <!-- ====== Central Hub ====== -->
  <g transform="translate(960, 560)" filter="url(#shadow)">
    <circle r="140" fill="url(#hub)"/>
    <circle r="140" fill="none" stroke="#FFB81C" stroke-width="6" stroke-dasharray="4 8" opacity="0.55"/>
    <text y="-10" text-anchor="middle" font-size="68" font-weight="900" fill="#fff" letter-spacing="3">SMART</text>
    <text y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#FFE082" letter-spacing="4">FRAMEWORK</text>
  </g>

  <!-- ====== Connector lines from hub to cards ====== -->
  <g stroke="#B0BEC5" stroke-width="2" fill="none" stroke-dasharray="6 6" opacity="0.6">
    <line x1="960" y1="560" x2="320"  y2="320"/>
    <line x1="960" y1="560" x2="730"  y2="900"/>
    <line x1="960" y1="560" x2="1190" y2="900"/>
    <line x1="960" y1="560" x2="1600" y2="320"/>
    <line x1="960" y1="560" x2="960"  y2="250"/>
  </g>

  <!-- ====== CARD: SPECIFIC (top center) ====== -->
  <g transform="translate(960, 250)" filter="url(#shadow)">
    <rect x="-180" y="-100" width="360" height="200" rx="18" fill="url(#card-s)"/>
    <!-- icon: target -->
    <g transform="translate(-135, -45)" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round">
      <circle r="38" cx="0" cy="0"/>
      <circle r="22" cx="0" cy="0"/>
      <circle r="8" cx="0" cy="0" fill="#fff"/>
    </g>
    <text x="-65" y="-50" font-size="32" font-weight="800" fill="#fff">S — Specific</text>
    <text x="-65" y="-15" font-size="20" font-weight="600" fill="#E3F2FD">Spesifik</text>
    <text x="-65" y="25" font-size="17" fill="#fff" opacity="0.92">Target &amp; deliverable jelas,</text>
    <text x="-65" y="50" font-size="17" fill="#fff" opacity="0.92">tidak ambigu.</text>
  </g>

  <!-- ====== CARD: MEASURABLE (top left) ====== -->
  <g transform="translate(320, 320)" filter="url(#shadow)">
    <rect x="-200" y="-90" width="400" height="180" rx="18" fill="url(#card-m)"/>
    <!-- icon: ruler/chart -->
    <g transform="translate(-150, -25)" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-30" y="-30" width="60" height="60" rx="6"/>
      <line x1="-20" y1="20" x2="-20" y2="5"/>
      <line x1="-5"  y1="20" x2="-5"  y2="-10"/>
      <line x1="10"  y1="20" x2="10"  y2="-5"/>
      <line x1="25"  y1="20" x2="25"  y2="-15"/>
    </g>
    <text x="-85" y="-40" font-size="32" font-weight="800" fill="#fff">M — Measurable</text>
    <text x="-85" y="-7" font-size="20" font-weight="600" fill="#E8F5E9">Terukur</text>
    <text x="-85" y="30" font-size="17" fill="#fff" opacity="0.92">Setiap proses punya parameter</text>
    <text x="-85" y="55" font-size="17" fill="#fff" opacity="0.92">evaluasi yang terukur.</text>
  </g>

  <!-- ====== CARD: ACHIEVABLE (top right) ====== -->
  <g transform="translate(1600, 320)" filter="url(#shadow)">
    <rect x="-200" y="-90" width="400" height="180" rx="18" fill="url(#card-a)"/>
    <!-- icon: checkmark/badge -->
    <g transform="translate(-150, -25)" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <circle r="35" cx="0" cy="0"/>
      <polyline points="-15,2 -3,16 18,-12"/>
    </g>
    <text x="-85" y="-40" font-size="32" font-weight="800" fill="#fff">A — Achievable</text>
    <text x="-85" y="-7" font-size="20" font-weight="600" fill="#FFE0B2">Dapat Dicapai</text>
    <text x="-85" y="30" font-size="17" fill="#fff" opacity="0.92">Tugas sesuai kemampuan</text>
    <text x="-85" y="55" font-size="17" fill="#fff" opacity="0.92">coachee.</text>
  </g>

  <!-- ====== CARD: RELEVANT (bottom left) ====== -->
  <g transform="translate(730, 900)" filter="url(#shadow)">
    <rect x="-200" y="-90" width="400" height="180" rx="18" fill="url(#card-r)"/>
    <!-- icon: link/connect -->
    <g transform="translate(-150, -25)" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -25,-10 a 18,18 0 0 1 25,-25 l 15,15"/>
      <path d="M 25,10 a 18,18 0 0 1 -25,25 l -15,-15"/>
      <line x1="-12" y1="12" x2="12" y2="-12"/>
    </g>
    <text x="-85" y="-40" font-size="32" font-weight="800" fill="#fff">R — Relevant</text>
    <text x="-85" y="-7" font-size="20" font-weight="600" fill="#F3E5F5">Relevan</text>
    <text x="-85" y="30" font-size="17" fill="#fff" opacity="0.92">Sesuai lingkup pekerjaan</text>
    <text x="-85" y="55" font-size="17" fill="#fff" opacity="0.92">untuk tingkatkan kompetensi.</text>
  </g>

  <!-- ====== CARD: TIME-BOUND (bottom right) ====== -->
  <g transform="translate(1190, 900)" filter="url(#shadow)">
    <rect x="-200" y="-90" width="400" height="180" rx="18" fill="url(#card-t)"/>
    <!-- icon: clock -->
    <g transform="translate(-150, -25)" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <circle r="35" cx="0" cy="0"/>
      <line x1="0" y1="0" x2="0" y2="-22"/>
      <line x1="0" y1="0" x2="18" y2="5"/>
      <line x1="0" y1="-35" x2="0" y2="-30"/>
      <line x1="35" y1="0" x2="30" y2="0"/>
    </g>
    <text x="-85" y="-40" font-size="32" font-weight="800" fill="#fff">T — Time-Bound</text>
    <text x="-85" y="-7" font-size="20" font-weight="600" fill="#FFCDD2">Berjangka Waktu</text>
    <text x="-85" y="30" font-size="17" fill="#fff" opacity="0.92">Jadwal awal &amp; akhir sudah</text>
    <text x="-85" y="55" font-size="17" fill="#fff" opacity="0.92">ditentukan dengan jelas.</text>
  </g>

  <!-- ====== Footer note ====== -->
  <text x="960" y="1040" text-anchor="middle" font-size="16" fill="#888" letter-spacing="2">
    PROTON dirancang menggunakan prinsip SMART · PT Kilang Pertamina Balikpapan · 2026
  </text>
</svg>
