  <script>
    const SEV_ORDER = {critical:0, high:1, medium:2, low:3};
    const SEV_LABEL = {critical:'Critical', high:'High', medium:'Medium', low:'Low'};
    const pageById = Object.fromEntries(DATA.pages.map(p => [p.id, p]));
    const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const sevBadge = s => `<span class="badge sev-${s}">${SEV_LABEL[s]}</span>`;

    // 1. Executive summary
    (function(){
      const e = DATA.executiveSummary;
      const cards = [
        ['Total Gap', e.totalGaps, 'secondary'],
        ['Critical', e.bySeverity.critical, 'danger'],
        ['High', e.bySeverity.high, 'warning'],
        ['Medium', e.bySeverity.medium, 'warning'],
        ['Low', e.bySeverity.low, 'secondary']
      ].map(([l,n,c]) => `<div class="col"><div class="card stat-card text-center p-3"><div class="stat-num text-${c}">${n}</div><div class="small-muted">${l}</div></div></div>`).join('');
      const top5 = e.top5.map(id => {
        const g = DATA.gaps.find(x=>x.id===id);
        return `<li class="mb-1">${sevBadge(g.severity)} <strong>${esc(g.title)}</strong> <span class="small-muted">(${g.id} · ${g.pages.map(p=>esc(pageById[p]?.name||p)).join(', ')})</span></li>`;
      }).join('');
      const v25 = (e.addressedByV25||[]).join(', ');
      document.getElementById('executive-summary').innerHTML =
        `<h2 class="sec"><i class="bi bi-clipboard-data"></i> Ringkasan Eksekutif</h2>
         <div class="row g-3 mb-3 row-cols-2 row-cols-md-5">${cards}</div>
         <div class="card p-3"><h6 class="mb-2"><i class="bi bi-exclamation-triangle text-warning"></i> Top 5 Gap Prioritas</h6><ol class="mb-2 ps-3">${top5}</ol>
         <p class="small-muted mb-0"><i class="bi bi-info-circle"></i> ${esc(v25)} sudah masuk scope milestone v25.0 (Proton Kelulusan & Bypass) — tak dihitung sebagai pekerjaan baru.</p></div>`;
    })();

    // 2. Flow diagram (text/box tiers)
    (function(){
      const box = (id) => { const p = pageById[id]; return p?`<span class="flow-tier">${esc(p.name)}</span>`:''; };
      const html =
        `<h2 class="sec"><i class="bi bi-signpost-split"></i> Flow 3-Tier + Branch</h2>
         <div class="card p-3">
           <div class="mb-2"><strong>Tier-0 Menu:</strong> <span class="flow-tier bg-light">Navbar "CDP"</span> <span class="flow-arrow">→</span> ${box('cdp-index')}</div>
           <div class="mb-2"><strong>Tier-1 Hub (4 kartu):</strong> ${box('cdp-planidp')} ${box('cdp-coachingproton')} ${box('cdp-historiproton')} ${box('cdp-dashboard')}</div>
           <div class="mb-2"><strong>Tier-2 Drill:</strong> CoachingProton/Dashboard <span class="flow-arrow">→</span> ${box('cdp-deliverable')} <span class="flow-arrow">→</span> ${box('cdp-editcoachingsession')}; HistoriProton <span class="flow-arrow">→</span> ${box('cdp-historiprotondetail')}</div>
           <hr>
           <div class="mb-2"><strong>Branch Admin (dari Kelola Data/Home):</strong> ${box('cdp-certmanagement')} ${box('protondata-index')} ${box('protondata-override')} ${box('protondata-importsilabus')}</div>
           <div class="mb-0"><strong>Branch Setup (Admin):</strong> ${box('coachmapping-coachcoachee')} ${box('coachmapping-workload')}</div>
           <p class="small-muted mt-2 mb-0"><i class="bi bi-exclamation-circle text-warning"></i> Anomali flow: Deliverable balik ke PlanIdp (bukan asal) — lihat G-05. CertManagement entry Admin tapi exit ke CDP — lihat G-09.</p>
         </div>`;
      document.getElementById('flow-diagram').innerHTML = html;
    })();

    // 3. Consistency matrix
    (function(){
      const has = (v) => (Array.isArray(v)?v.length>0 && !(v.length===1 && (v[0]==='none')) : !!v);
      const rows = DATA.pages.map(p => {
        const filter = has(p.filters);
        const table = p.table && has(p.table.columns);
        const exp = has(p.export);
        const modal = has(p.modals);
        const cell = b => b?'<td class="yes">✓</td>':'<td class="no">·</td>';
        return `<tr><td class="name">${esc(p.name)}<br><span class="small-muted">${esc(p.route)}</span></td>${cell(filter)}${cell(table)}${cell(exp)}${cell(modal)}<td class="small-muted">${esc(p.roles).slice(0,40)}</td></tr>`;
      }).join('');
      document.getElementById('consistency-matrix').innerHTML =
        `<h2 class="sec"><i class="bi bi-grid-3x3"></i> Matrix Konsistensi</h2>
         <div class="card p-2"><div class="table-responsive"><table class="table table-sm table-hover matrix mb-0">
           <thead><tr><th class="name">Page</th><th>Filter</th><th>Tabel</th><th>Export</th><th>Modal</th><th>Role</th></tr></thead>

           <p class="small-muted mt-2 mb-1 px-2">Kolom kosong (·) di page sejenis = kandidat gap konsistensi. Cth: Dashboard tanpa Export/Search (G-04/G-10).</p></div>`;
    })();

    // 4. Gap panel (grouped by severity)
    (function(){
      const order = ['critical','high','medium','low'];
      let html = `<h2 class="sec"><i class="bi bi-bug"></i> Panel Temuan Gap (6 Lensa)</h2>`;
      order.forEach(sev => {
        const gs = DATA.gaps.filter(g=>g.severity===sev);
        if(!gs.length) return;
        html += `<h6 class="mt-3 mb-2">${sevBadge(sev)} <span class="text-muted">(${gs.length})</span></h6>`;
        html += gs.map(g => `
          <div class="card gap-card sev-${g.severity} mb-2 p-3">
            <div class="d-flex justify-content-between align-items-start">
              <div><span class="badge bg-dark me-1">${g.id}</span><strong>${esc(g.title)}</strong></div>
              <span class="badge bg-info-subtle text-info-emphasis lens-badge">${esc(g.lens)}</span>

            <div class="small-muted mt-1">Page: ${g.pages.map(p=>esc(pageById[p]?.name||p)).join(', ')}</div>
            <div class="mt-2">${esc(g.detail)}</div>
          </div>`).join('');
      });
      document.getElementById('gap-panel').innerHTML = html;
    })();

    // 5. Roadmap (grouped by bucket)
    (function(){
      const buckets = [...new Set(DATA.roadmap.map(r=>r.bucket))];
      let html = `<h2 class="sec"><i class="bi bi-map"></i> Roadmap Rekomendasi</h2>`;
      buckets.forEach(b => {
        const rs = DATA.roadmap.filter(r=>r.bucket===b).sort((a,c)=>a.priority-c.priority);
        const rows = rs.map(r => {
          const g = DATA.gaps.find(x=>x.id===r.gapId);
          return `<tr><td><span class="badge bg-dark">${r.gapId}</span></td><td>${g?sevBadge(g.severity):''}</td><td>${esc(r.fix)}</td><td class="text-center"><span class="badge bg-secondary">${r.effort}</span></td><td class="text-center">${r.priority}</td></tr>`;
        }).join('');
        html += `<h6 class="mt-3 mb-2"><i class="bi bi-flag"></i> ${esc(b)}</h6>
          <div class="card p-2"><div class="table-responsive"><table class="table table-sm mb-0">
          <thead><tr><th>Gap</th><th>Sev</th><th>Usulan Fix</th><th class="text-center">Effort</th><th class="text-center">Prio</th></tr></thead>
          <tbody>${rows}</tbody></table></div></div>`;
      });
      html += `<p class="small-muted mt-2">Effort: S = &lt;½ hari · M = ½–2 hari · L = &gt;2 hari.</p>`;
      document.getElementById('roadmap').innerHTML = html;
    })();

    // 6. Page accordion (inventaris detail)
    (function(){
      const arr = (v,empty='—') => (Array.isArray(v)&&v.length&&!(v.length===1&&v[0]==='none'))?v.map(esc).join(', '):empty;
      const items = DATA.pages.map((p,i) => {
        const gapsHere = DATA.gaps.filter(g=>g.pages.includes(p.id));
        const actions = (p.actions||[]).map(a=>`<li><strong>${esc(a.label)}</strong> → <code>${esc(a.endpoint)}</code></li>`).join('') || '<li class="small-muted">—</li>';
        const tableCols = p.table && p.table.columns ? arr(p.table.columns) : '—';
        const flow = `dari: ${arr(p.flow?.from)} <span class="flow-arrow">→</span> ke: ${arr(p.flow?.to)}${p.flow?.back?` <span class="small-muted">(balik: ${esc(p.flow.back)})</span>`:''}`;
        const live = p.liveNote?`<div class="alert alert-warning py-2 px-2 small mt-2 mb-0"><i class="bi bi-eye"></i> <strong>Live:</strong> ${esc(p.liveNote)}</div>`:'';
        const gapBadges = gapsHere.map(g=>`<span class="badge sev-${g.severity} me-1">${g.id}</span>`).join('');
        return `
        <div class="accordion-item">
          <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#acc${i}">
              <span class="me-2">${esc(p.name)}</span><code class="small me-2">${esc(p.route)}</code> ${gapBadges}
            </button>
          </h2>
          <div id="acc${i}" class="accordion-collapse collapse" data-bs-parent="#page-accordion-inner">
            <div class="accordion-body">
              <p class="mb-1"><strong>Purpose:</strong> ${esc(p.purpose)}</p>
              <p class="mb-1"><strong>Action/View:</strong> <code>${esc(p.action)}</code> · <code>${esc(p.view)}</code></p>
              <p class="mb-1"><strong>Flow:</strong> ${flow}</p>
              <p class="mb-1"><strong>Role:</strong> ${esc(p.roles)}</p>
              <p class="mb-1"><strong>Filter:</strong> ${arr(p.filters)}</p>
              <p class="mb-1"><strong>Tabel:</strong> ${tableCols}${p.table&&p.table.source?` <span class="small-muted">(src: ${esc(p.table.source)})</span>`:''}</p>
              <p class="mb-1"><strong>Aksi/Endpoint:</strong></p><ul class="mb-1">${actions}</ul>
              <p class="mb-1"><strong>Modal:</strong> ${arr(p.modals)}</p>
              <p class="mb-1"><strong>Export:</strong> ${arr(p.export)}</p>
              <p class="mb-1"><strong>Data source:</strong> <span class="small-muted">${esc(p.dataSource)}</span></p>
              ${live}
            </div>
          </div>
        </div>`;
      }).join('');
      document.getElementById('page-accordion').innerHTML =
        `<h2 class="sec"><i class="bi bi-list-columns"></i> Inventaris 14 Page (detail)</h2>
         <div class="accordion" id="page-accordion-inner">${items}</div>`;
    })();
