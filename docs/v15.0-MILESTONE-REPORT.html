<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Milestone v15.0 — Audit Findings 27 April 2026</title>
<style>
:root {
  --brand: #e30613;
  --text: #1f2937;
  --muted: #6b7280;
  --border: #e5e7eb;
  --bg-alt: #f9fafb;
  --green: #16a34a;
  --amber: #f59e0b;
  --red: #dc2626;
  --highlight-bg: #fef3c7;
  --highlight-border: #f59e0b;
}

* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  background: #ffffff;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px;
}

h1 { font-size: 28px; margin: 0 0 8px; color: var(--text); }
h2 { font-size: 22px; margin: 48px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
h3 { font-size: 18px; margin: 24px 0 12px; }
h4 { font-size: 16px; margin: 16px 0 8px; }

p { margin: 0 0 12px; }

code, .mono {
  font-family: Consolas, "Courier New", monospace;
  font-size: 13px;
  background: var(--bg-alt);
  padding: 2px 6px;
  border-radius: 3px;
}

pre {
  font-family: Consolas, "Courier New", monospace;
  font-size: 13px;
  background: var(--bg-alt);
  padding: 12px 16px;
  border-radius: 6px;
  overflow-x: auto;
  border-left: 3px solid var(--brand);
}

table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
}

th, td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

th { background: var(--bg-alt); font-weight: 600; }
tbody tr:nth-child(even) { background: var(--bg-alt); }

.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  color: #ffffff;
}
.badge-done { background: var(--green); }
.badge-deferred { background: var(--amber); }
.badge-blocker { background: var(--red); }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin: 24px 0;
}

.kpi-box {
  text-align: center;
  padding: 20px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-alt);
}
.kpi-box .num { font-size: 32px; font-weight: 700; color: var(--brand); display: block; }
.kpi-box .label { font-size: 13px; color: var(--muted); }

.status-box {
  padding: 16px 20px;
  border-radius: 8px;
  background: #ecfdf5;
  border: 1px solid var(--green);
  color: #065f46;
  font-weight: 600;
  margin: 16px 0;
}

.it-actions {
  background: var(--highlight-bg);
  border: 2px solid var(--highlight-border);
  border-radius: 8px;
  padding: 24px;
  margin: 24px 0;
}
.it-actions h2 { border-bottom: 2px solid var(--highlight-border); margin-top: 0; }

.phase-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin: 16px 0;
  background: #ffffff;
}
.phase-card h3 { margin-top: 0; color: var(--brand); }
.phase-card .meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
}
.phase-card .field {
  margin: 8px 0;
}
.phase-card .field-label {
  font-weight: 600;
  display: inline-block;
  min-width: 90px;
  color: var(--text);
}

header.report-header {
  border-bottom: 4px solid var(--brand);
  padding-bottom: 16px;
  margin-bottom: 24px;
}
header.report-header .subtitle { color: var(--muted); font-size: 16px; }
header.report-header .meta-row { font-size: 13px; color: var(--muted); margin-top: 8px; }

footer.report-footer {
  margin-top: 64px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  text-align: center;
}

@media print {
  body { font-size: 12px; }
  .container { max-width: none; padding: 16px; }
  h2 { page-break-after: avoid; }
  .phase-card { page-break-inside: avoid; }
  .it-actions { background: #ffffff; }
  .kpi-box { background: #ffffff; }
  pre { white-space: pre-wrap; word-wrap: break-word; }
}
</style>
</head>
<body>
<div class="container">
  <!-- SECTIONS akan diisi pada task berikutnya -->
</div>
</body>
</html>
